<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Client Loan Records</title>
    <meta charset="UTF-8">
</head>
<body>

<h1>Client Loan Records</h1>

<p th:if="${successMessage}" th:text="${successMessage}" style="color: green;"></p>

<a th:href="@{/add}">Add Client</a>

<table border="1" cellpadding="8">
    <thead>
    <tr>
        <th>Client No</th>
        <th>Name</th>
        <th>Loan Amount</th>
        <th>Years</th>
        <th>Loan Type</th>
        <th>Actions</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="client : ${clients}">
        <td th:text="${client.clientNo}"></td>
        <td th:text="${client.name}"></td>
        <td th:text="${client.loanAmount}"></td>
        <td th:text="${client.years}"></td>
        <td th:text="${client.loanType}"></td>
        <td>
            <a th:href="@{/edit/{id}(id=${client.clientNo})}">Edit</a>
            <span>&nbsp;</span>

            <a th:href="@{/delete/{id}(id=${client.clientNo})}"
               onclick="return confirm('Are you sure you want to delete this record?');">
                Delete
            </a>
            <span>&nbsp;</span>

            <a th:href="@{/amortization/{id}(id=${client.clientNo})}">Amortization</a>
        </td>
    </tr>
    </tbody>
</table>

</body>
</html>
