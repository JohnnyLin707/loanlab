<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Add Client</title>
    <meta charset="UTF-8">
</head>
<body>

<h1>Add Client</h1>

<form th:action="@{/save}" th:object="${clientLoan}" method="post">
    <label>Client Number</label><br>
    <input type="number" th:field="*{clientNo}"><br><br>

    <label>Name</label><br>
    <input type="text" th:field="*{name}"><br><br>

    <label>Loan Amount</label><br>
    <input type="number" step="0.01" th:field="*{loanAmount}"><br><br>

    <label>Years</label><br>
    <input type="number" th:field="*{years}"><br><br>

    <label>Loan Type</label><br>
    <input type="text" th:field="*{loanType}"><br><br>

    <button type="submit">Save</button>
    <a th:href="@{/}">Back</a>
</form>

</body>
</html>
